name: A workflow for Project World Reports App
on: push

jobs:
  build:
    name: Project World Reports action
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Set up JDK 10
        uses: actions/setup-java@v2
        with:
          java-version: '10'
          distribution: 'adopt'
      - name: Build with Maven
        run: mvn package
      - name: Run docker compose
        run: docker-compose up --abort-on-container-exit

